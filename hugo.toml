title = "Leonardo Benicio"
theme = "github.com/lbenicio/aboutme-v2-theme"
baseURL = "https://lbenicio.dev/"
locale = "en-us"
resourceDir = "resources"

[pagination]
pagerSize = 24
path = "p"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
style = "github-dark"
guessSyntax = true

[taxonomies]
tag = "tags"
category = "categories"

[outputs]
home = ["HTML", "RSS"]
section = ["HTML", "RSS", "JSON"]
taxonomy = ["HTML", "RSS"]
term = ["HTML", "RSS"]

[sitemap]
changefreq = "daily"
priority = 0.5
filename = "sitemap.xml"

[permalinks]
post = "/post/:year/:month/:day/:slug/"
publications = "/publications/:slug/"
reading = "/reading/:slug/"

[params]
author = "Leonardo Benicio"
description = "About me, writing, and publications"
showReadingTime = true

# Homepage hero
homepageHeading = "About Leonardo Benicio"
homepageSubtitle = "This is a personal space to learn about my journey, skills, and passions. Explore to learn more about me and feel free to get in touch."

# Profile picture
profilePicture = "static/assets/images/avatar/profile-picture.png"
profilePictureAvif = "static/assets/images/avatar/profile-picture.avif"
profilePictureWebp = "static/assets/images/avatar/profile-picture.webp"
profilePictureAlt = "Leonardo Benicio"

# Site URL (for canonical links, SEO)
siteUrl = "https://lbenicio.dev"
appMode = "ABOUT_ONLY"
aboutOrigin = "https://lbenicio.dev"

# Contact
contactEmail = "hi@lbenicio.dev"
contactName = "Leonardo Benicio"
contactPostUrl = "https://formbold.com/s/3nqz5"
contactAuthToken = ""

# Social
